<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Putinha 🎂</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.page{
    display:none;
    width:100vw;
    height:100vh;
    position:relative;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

.page.active{
    display:flex;
}

img{
    max-width:90%;
    max-height:75vh;
    border-radius:20px;
    box-shadow:0 0 30px rgba(255,255,255,0.25);
}

h1{
    font-size:3rem;
    margin-bottom:20px;
}

p{
    font-size:1.4rem;
    margin-top:20px;
    max-width:700px;
}

button{
    position:absolute;
    border:none;
    padding:15px 28px;
    border-radius:999px;
    cursor:pointer;
    background:#ff4fa3;
    color:white;
    font-size:18px;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}

.center{
    top:60%;
    left:50%;
    transform:translate(-50%,-50%);
}

.final{
    background:linear-gradient(135deg,#ff4fa3,#8a2be2);
}
</style>
</head>

<body>

<div id="page1" class="page active">
    <h1>🎂 Happy Birthday Putinha 🎂</h1>

    <button class="center" onclick="showPage(2)">
        Clique ici ✨
    </button>
</div>

<div id="page2" class="page">
    <img src="smiley.JPG">
    <p>on se croyait trop stylés</p>

    <button style="top:40px; right:30px;" onclick="showPage(3)">
        Clique ici
    </button>
</div>

<div id="page3" class="page">
    <img src="debout.JPG">
    <p>tu pensais que t'étais violetta</p>

    <button style="bottom:40px; right:30px;" onclick="showPage(4)">
        Clique ici
    </button>
</div>

<div id="page4" class="page">
    <img src="selfie.JPG">
    <p>très beau bouton</p>

    <button style="top:40px; left:30px;" onclick="showPage(5)">
        Clique ici
    </button>
</div>

<div id="page5" class="page">
    <img src="homme.JPG">
    <p>ça c'est cadeau</p>

    <button style="bottom:40px; left:30px;" onclick="showPage(6)">
        Dernier clic
    </button>
</div>

<div id="page6" class="page final">
    <h1>HAPPY BIRTHDAY PUTINHA 🎂</h1>

    <p style="font-size:1.7rem;">
        I hope someone enjoys growing old with you,<br>
        as much as I enjoyed growing up with you.
    </p>
</div>

<script>
function showPage(pageNumber){

    document.querySelectorAll(".page").forEach(page=>{
        page.classList.remove("active");
    });

    document.getElementById("page"+pageNumber)
        .classList.add("active");
}
</script>

</body>
</html>
